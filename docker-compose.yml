services:
    app:
        container_name: marketplace-app
        build:
            context: docker/php
            dockerfile: Dockerfile
        restart: unless-stopped
        working_dir: /var/www/
        volumes:
            - ./:/var/www
        depends_on:
            - redis
        networks:
            - app-net

    nginx:
        image: nginx:alpine
        restart: unless-stopped
        ports:
            - "8000:80"
        volumes:
            - ./:/var/www
            - ./docker/nginx/:/etc/nginx/conf.d/
        networks:
            - app-net

    db:
        image: postgres:15
        restart: unless-stopped
        environment:
            POSTGRES_DB: ${DB_DATABASE:-postgres}
            POSTGRES_USER: ${DB_USERNAME:-postgres}
            POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
        volumes:
            - ./docker/postgres/data:/var/lib/postgresql/data
        ports:
            - "5432:5432"
        networks:
            - app-net

    redis:
        image: redis:latest
        networks:
            - app-net

networks:
    app-net:
        driver: bridge
